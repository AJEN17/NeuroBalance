services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    networks:
      - neuro_net
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    networks:
      neuro_net:
        aliases:
          - backend

 prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml   # <--- THIS IS THE MAGIC LINE
    networks:
      - neuro_net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - neuro_net

networks:
  neuro_net:
    driver: bridge

volumes:
  grafana-data:
